<script>

    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: { sans: ['Geist', 'ui-sans-serif', 'system-ui'], mono: ['Geist Mono', 'ui-monospace'] },

        keyframes: {
          fadeIn: { '0%':{opacity:'0',transform:'translateY(4px)'}, '100%':{opacity:'1',transform:'translateY(0)'} },
          slideIn: { '0%':{transform:'translateX(100%)'}, '100%':{transform:'translateX(0)'} },
          pulseRing: { '0%,100%':{boxShadow:'0 0 0 0 rgba(52,211,153,0.5)'}, '50%':{boxShadow:'0 0 0 6px rgba(52,211,153,0)'} },

<style>

  .chip { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; font-size:11px; font-weight:500; border-radius:9999px; line-height:1.4; white-space:nowrap; }

  /* progress bar segments */

  /* Soft divider */

  /* Hide scrollbar on horizontal scroll for chips */

const fmtDate = s => { if(!s) return '—'; const d=new Date(s); return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); };
const daysAgo = s => { if(!s) return null; const d=new Date(s); return Math.floor((new Date('2026-05-08') - d) / (1000*60*60*24)); };
const since = s => { const d=daysAgo(s); if(d===null)return '—'; if(d===0)return 'today'; if(d===1)return 'yesterday'; if(d<7)return d+'d ago'; if(d<30)return Math.floor(d/7)+'w ago'; return Math.floor(d/30)+'mo ago'; };

const toneClass = (tone, kind='chip') => {

    emerald: { chip:'bg-emerald-400/10 text-emerald-300 ring-1 ring-emerald-400/20',  dot:'bg-emerald-400', solid:'bg-emerald-400 text-emerald-950', text:'text-emerald-300' },

};

<script>

        ${[
          {id:'all',     label:'All',             count:counts.all,    active:true},
          {id:'active',  label:'Active',          count:counts.active, active:false, tone:'emerald'},
          {id:'onhold',  label:'On Hold',         count:counts.onhold, active:false, tone:'amber'},
          {id:'pay',     label:'Payment Pending', count:counts.pay,    active:false, tone:'rose'},
          {id:'comp',    label:'Course Complete', count:3,             active:false, tone:'emerald'},
        ].map(t=>`

      </div>

      <!-- Filter row -->
      <div class="flex items-center gap-2 flex-wrap">
        <div class="relative flex-1 min-w-[260px] max-w-md">
          <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-ink-500"></i>
          <input placeholder="Search by name, email, phone, ID..." class="w-full pl-9 pr-3 py-1.5 bg-ink-900/60 ring-soft rounded-md text-[12.5px] placeholder:text-ink-500 focus:outline-none focus:ring-1 focus:ring-emerald-400/40">
        </div>
        ${[
          {label:'Sort: Order Joined ↓', icon:'arrow-up-down'},
          {label:'Course',    icon:'graduation-cap'},
          {label:'Tags',      icon:'tags'},

          {label:'Date Range',icon:'calendar'},
          {label:'Response',  icon:'message-circle'},

        <div class="flex-1"></div>

      </div>

      <!-- Table -->
      <div class="bg-ink-900/40 ring-soft rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-[12.5px] min-w-[1300px]">
            <thead>
              <tr class="text-[11px] uppercase tracking-wider text-ink-500 border-b border-white/5 bg-white/[0.015]">
                <th class="text-left font-medium py-2.5 px-3 w-8"><input type="checkbox" class="accent-emerald-400"></th>
                <th class="text-left font-medium py-2.5 px-3 w-12 cursor-pointer"><span class="flex items-center gap-1">#<i data-lucide="arrow-up-down" class="w-3 h-3 text-ink-600"></i></span></th>
                <th class="text-left font-medium py-2.5 px-3">Student</th>
                <th class="text-left font-medium py-2.5 px-3">Course</th>
                <th class="text-left font-medium py-2.5 px-3">Tags</th>
                <th class="text-left font-medium py-2.5 px-3">Awards</th>
                <th class="text-left font-medium py-2.5 px-3 cursor-pointer"><span class="flex items-center gap-1">Start <i data-lucide="arrow-up-down" class="w-3 h-3 text-ink-600"></i></span></th>
                <th class="text-left font-medium py-2.5 px-3">End</th>
                <th class="text-left font-medium py-2.5 px-3">Last Contact</th>
                <th class="text-left font-medium py-2.5 px-3">Progress</th>
                <th class="text-left font-medium py-2.5 px-3">Status</th>
                <th class="text-left font-medium py-2.5 px-3">Response</th>
                <th class="text-left font-medium py-2.5 px-3 w-8"></th>
              </tr>
            </thead>
            <tbody>
              ${[...STUDENTS].sort((a,b)=>new Date(a.startDate)-new Date(b.startDate)).map((s,idx)=>`
                <tr onclick="openStudent('${s.id}')" class="border-b border-white/5 hover:bg-white/[0.025] cursor-pointer transition">
                  <td class="py-2.5 px-3" onclick="event.stopPropagation()"><input type="checkbox" class="accent-emerald-400"></td>
                  <td class="py-2.5 px-3 text-ink-500 font-mono text-[11.5px]">${String(idx+1).padStart(2,'0')}</td>
                  <td class="py-2.5 px-3">
                    <div class="flex items-center gap-2.5">
                      <div class="w-8 h-8 rounded-full bg-gradient-to-br from-emerald-400/15 to-sky-400/15 ring-soft grid place-items-center text-[10.5px] font-semibold">${s.initials}</div>
                      <div>
                        <div class="font-medium flex items-center gap-1.5">${s.name}${s.priority==='high'?'<span class="w-1.5 h-1.5 rounded-full bg-amber-400" title="High priority"></span>':''}</div>
                        <div class="text-[10.5px] text-ink-500 font-mono">${s.id}</div>
                      </div>
                    </div>
                  </td>
                  <td class="py-2.5 px-3 whitespace-nowrap">
                    <div class="font-medium">${s.course}</div>
                  </td>
                  <td class="py-2.5 px-3">
                    <div class="flex items-center gap-1 flex-wrap max-w-[180px]">
                      ${s.tags.slice(0,2).map(t=>chip(t, tagTone(t))).join('')}
                      ${s.tags.length>2?`<span class="text-[10.5px] text-ink-500 font-mono">+${s.tags.length-2}</span>`:''}
                    </div>
                  </td>
                  <td class="py-2.5 px-3">
                    ${s.awards.length===0 ? '<span class="text-ink-600">—</span>' : `
                      <div class="flex -space-x-1">
                        ${s.awards.slice(0,3).map(a=>{
                          const icon = a.icon==='diamond'?'gem':a.icon==='sparkle'?'sparkles':a.icon;
                          return `<div class="w-6 h-6 rounded-full bg-gradient-to-br from-amber-400/20 to-amber-600/20 ring-1 ring-amber-400/30 grid place-items-center" title="${a.name}"><i data-lucide="${icon}" class="w-3 h-3 text-amber-300"></i></div>`;
                        }).join('')}
                      </div>`}
                  </td>
                  <td class="py-2.5 px-3 text-ink-400 font-mono text-[11.5px]">${fmtDate(s.startDate)}</td>
                  <td class="py-2.5 px-3 text-ink-400 font-mono text-[11.5px]">${fmtDate(s.endDate)}</td>
                  <td class="py-2.5 px-3">
                    <div class="font-mono text-[11.5px] text-ink-300">${since(s.lastContact)}</div>
                    <div class="text-[10.5px] text-ink-500 font-mono">${fmtDate(s.lastContact)}</div>
                  </td>
                  <td class="py-2.5 px-3 w-40">${progressBar(s.progress,6)}</td>
                  <td class="py-2.5 px-3">
                    ${chip(s.status.label, s.status.tone)}
                    ${s.emi && s.emi.status==='overdue' ? '<span class="chip bg-rose-400/10 text-rose-300 ring-1 ring-rose-400/25 mt-1" title="Course access blocked due to EMI default"><i data-lucide="lock" class="w-2.5 h-2.5"></i>Access Blocked</span>' : ''}

        <!-- Footer -->
        <div class="flex items-center justify-between px-4 py-2.5 border-t border-white/5 bg-white/[0.01]">

          <div class="flex items-center gap-1 text-[12px]">

            <button class="w-7 h-7 rounded text-ink-400 hover:bg-white/5 font-mono">2</button>
            <button class="w-7 h-7 rounded text-ink-400 hover:bg-white/5 font-mono">3</button>
            <span class="text-ink-600">…</span>
            <button class="w-7 h-7 rounded text-ink-400 hover:bg-white/5 font-mono">59</button>
            <button class="px-2 py-1 rounded text-ink-300 hover:bg-white/5"><i data-lucide="chevron-right" class="w-3.5 h-3.5"></i></button>
          </div>
        </div>
      </div>
    </div>
  `;
}

/* ============================================================
   STUDENT PROFILE — slide-over panel
   ============================================================ */
function openStudent(id) {
  const s = STUDENTS.find(x=>x.id===id); if(!s) return;
  const ICONS = { crown:'crown', star:'star', diamond:'gem', sparkle:'sparkles', medal:'medal', trophy:'trophy', award:'award' };
  document.getElementById('slideoverRoot').innerHTML = `
    <div class="fixed inset-0 z-40 backdrop bg-black/40" onclick="closeStudent()"></div>
    <div class="fixed top-0 right-0 bottom-0 w-full max-w-[560px] z-50 bg-ink-950 border-l border-white/5 animate-slideIn flex flex-col">
      <!-- Header -->
      <div class="px-6 py-5 border-b border-white/5">
        <div class="flex items-start justify-between">
          <div class="flex items-center gap-3.5">
            <div class="w-12 h-12 rounded-full bg-gradient-to-br from-emerald-400/20 to-sky-400/20 ring-1 ring-white/10 grid place-items-center text-[14px] font-semibold">${s.initials}</div>
            <div>
              <div class="text-[18px] font-semibold tracking-tight">${s.name}</div>
              <div class="flex items-center gap-2 text-[11.5px] text-ink-500 font-mono">
                <span>${s.id}</span><span>·</span><span>${s.email}</span>
              </div>
            </div>
          </div>
          <div class="flex items-center gap-1">
            <button class="w-8 h-8 grid place-items-center rounded-md hover:bg-white/5 text-ink-300"><i data-lucide="phone" class="w-4 h-4"></i></button>
            <button class="w-8 h-8 grid place-items-center rounded-md hover:bg-white/5 text-ink-300"><i data-lucide="mail" class="w-4 h-4"></i></button>
            <button class="w-8 h-8 grid place-items-center rounded-md hover:bg-white/5 text-ink-300"><i data-lucide="message-circle" class="w-4 h-4"></i></button>
            <div class="w-px h-5 bg-white/10 mx-1"></div>
            <button onclick="closeStudent()" class="w-8 h-8 grid place-items-center rounded-md hover:bg-white/5 text-ink-300"><i data-lucide="x" class="w-4 h-4"></i></button>
          </div>
        </div>
        <div class="flex items-center gap-2 mt-4 flex-wrap">
          ${chip(s.status.label, s.status.tone)}
          <span class="chip bg-white/5 text-ink-300 ring-1 ring-white/10"><i data-lucide="graduation-cap" class="w-2.5 h-2.5"></i>${s.course}</span>
          ${s.tags.map(t=>chip(t, tagTone(t))).join('')}
        </div>
      </div>

      <!-- Tabs -->
      <div class="flex items-center gap-1 px-6 border-b border-white/5">
        ${['Overview','Comments','History','Files'].map((t,i)=>`
          <button class="px-3 py-2.5 text-[12.5px] font-medium relative ${i===0?'text-white':'text-ink-400 hover:text-white'}">${t}${i===0?'<span class="absolute bottom-[-1px] left-0 right-0 h-[2px] bg-emerald-400"></span>':''}</button>
        `).join('')}
      </div>

      <!-- Body scroll -->
      <div class="flex-1 overflow-y-auto p-6 space-y-6">
        <!-- Stats grid -->
        <div class="grid grid-cols-3 gap-3">
          ${[
            {l:'Progress', v:`${s.progress}/6`,         sub:'months done'},
            {l:'Awards',   v:s.awards.length,          sub:'achievements'},
            {l:'Last call',v:since(s.lastContact),     sub:fmtDate(s.lastContact)},
          ].map(stat=>`
            <div class="p-3 ring-soft rounded-lg bg-ink-900/40">
              <div class="text-[10.5px] uppercase tracking-wider text-ink-500 font-medium">${stat.l}</div>
              <div class="text-[18px] font-semibold tracking-tight num mt-1">${stat.v}</div>
              <div class="text-[10.5px] text-ink-500 font-mono">${stat.sub}</div>
            </div>
          `).join('')}
        </div>

        <!-- Details -->
        <div>
          <div class="text-[11px] uppercase tracking-wider text-ink-500 font-medium mb-2">Details</div>
          <div class="ring-soft rounded-lg divide-y divide-white/[0.04] bg-ink-900/30">
            ${[
              {k:'Phone',         v:s.phone,           icon:'phone'},
              {k:'Email',         v:s.email,           icon:'mail'},
              {k:'Start Date',    v:fmtDate(s.startDate), icon:'calendar'},
              {k:'End Date',      v:fmtDate(s.endDate),   icon:'calendar'},
              {k:'Priority',      v:s.priority.toUpperCase(), icon:'flag'},
            ].map(r=>`
              <div class="flex items-center gap-3 px-3.5 py-2.5">
                <i data-lucide="${r.icon}" class="w-3.5 h-3.5 text-ink-500"></i>
                <div class="text-[11.5px] text-ink-500 w-24">${r.k}</div>
                <div class="text-[12.5px] font-medium flex-1">${r.v}</div>
              </div>
            `).join('')}
          </div>
        </div>

        <!-- Course progress -->
        <div>
          <div class="flex items-center justify-between mb-2">
            <div class="text-[11px] uppercase tracking-wider text-ink-500 font-medium">Course Progress</div>
            ${s.emi && s.emi.status==='overdue'
              ? '<span class="chip bg-rose-400/10 text-rose-300 ring-1 ring-rose-400/30"><i data-lucide="lock" class="w-2.5 h-2.5"></i>Access blocked · EMI overdue</span>'
              : `<div class="text-[11px] font-mono text-ink-400">${s.progress}/6 months</div>`}
          </div>
          <div class="ring-soft rounded-lg p-4 bg-ink-900/30 ${s.emi && s.emi.status==='overdue' ? 'relative' : ''}">
            ${s.emi && s.emi.status==='overdue' ? `
              <div class="absolute inset-0 rounded-lg bg-ink-950/70 backdrop-blur-[1px] grid place-items-center z-10">
                <div class="text-center">
                  <div class="w-10 h-10 mx-auto rounded-full bg-rose-400/15 ring-1 ring-rose-400/30 grid place-items-center mb-1.5">
                    <i data-lucide="lock" class="w-5 h-5 text-rose-300"></i>
                  </div>
                  <div class="text-[12px] font-medium text-rose-200">Course Access Blocked</div>
                  <div class="text-[10.5px] text-ink-400 mt-0.5">Pending EMI must be cleared to resume</div>
                </div>
              </div>` : ''}
            <div class="grid grid-cols-6 gap-2">
              ${s.monthsStatus.map((m,i)=>`
                <button onclick="event.stopPropagation();toggleMonthStatus('${s.id}', ${i})" class="text-center group" title="Click to mark Month ${i+1} ${m==='done'?'as pending':'as done'}">
                  <div class="aspect-square rounded-lg ${m==='done'?'bg-emerald-400/15 ring-1 ring-emerald-400/30 group-hover:bg-emerald-400/25':'bg-white/[0.03] ring-1 ring-white/5 group-hover:ring-emerald-400/30 group-hover:bg-emerald-400/[0.06]'} grid place-items-center mb-1.5 cursor-pointer transition-all">
                    ${m==='done'
                      ? '<i data-lucide="check" class="w-4 h-4 text-emerald-300"></i>'
                      : '<i data-lucide="circle-dashed" class="w-4 h-4 text-ink-600 group-hover:text-emerald-400/70"></i>'}
                  </div>
                  <div class="text-[10px] font-mono text-ink-500 group-hover:text-ink-300">M${i+1}</div>
                </button>
              `).join('')}
            </div>
            <!-- Edit hint -->
            <div class="flex items-center justify-between mt-2.5 text-[10.5px] text-ink-500">
              <span class="flex items-center gap-1.5"><i data-lucide="pencil" class="w-3 h-3"></i>Click any month above to update progress</span>
              <span class="font-mono">${s.progress}/6 months · auto-saves</span>
            </div>
          </div>
        </div>


        <!-- EMI Schedule (dynamic per student) -->
        ${s.emi ? (() => {
          const e = s.emi;

          const overdue = e.status === 'overdue';

                </div>
                <div class="p-3.5">
                  <div class="text-[10px] uppercase tracking-wider text-ink-500 font-medium">Per ${e.frequency==='monthly'?'Month':'Period'}</div>
                  <div class="text-[18px] font-semibold num mt-1">₹${e.amount.toLocaleString('en-IN')}</div>
                  <div class="text-[10.5px] text-ink-500 font-mono mt-0.5">${e.frequency}</div>
                </div>
              </div>

              <!-- Progress bar -->
              <div class="px-4 pb-3.5">

              <!-- EMI dot strip (visualizes each instalment) -->
              <div class="px-4 pb-4">
                <div class="text-[10px] uppercase tracking-wider text-ink-500 font-medium mb-1.5">Instalments</div>
                <div class="flex flex-wrap gap-[3px]">

                    const isPaid = i < e.paid;

                    return `<div title="EMI ${i+1}/${e.total}" class="w-2 h-3 rounded-sm ${isPaid?'bg-emerald-400':isOverdueDot?'bg-rose-400 animate-pulse':isNext?'bg-amber-400':'bg-white/10'}"></div>`;

                  <div>
                    <div class="text-[11.5px] font-medium ${overdue?'text-rose-300':'text-emerald-200'}">${overdue?'Course access locked · '+(daysAgo(e.nextDue)||0)+' days overdue':'Next EMI due'} · ₹${e.amount.toLocaleString('en-IN')}</div>
                    <div class="text-[10.5px] text-ink-500 font-mono">${fmtDate(e.nextDue)} · EMI ${e.paid+1} of ${e.total}</div>
                  </div>
                </div>
                <div class="flex items-center gap-1">
                  <button class="px-2.5 h-7 rounded ring-soft hover:bg-white/5 text-[11px] text-ink-200 flex items-center gap-1"><i data-lucide="bell" class="w-3 h-3"></i>Remind</button>

                </div>

        ${s.progress >= 6 ? `

            <div class="w-12 h-12 rounded-xl grid place-items-center shrink-0" style="background:radial-gradient(circle at 30% 30%,#fcd34d,#f59e0b);box-shadow:0 6px 20px rgba(245,158,11,0.25)">

        <!-- Awards list (always present, with empty state) -->

          </div>
          ${s.awards.length > 0 ? `

                  <div class="w-9 h-9 rounded-lg grid place-items-center shrink-0" style="background:radial-gradient(circle at 30% 30%,#fcd34d,#f59e0b);box-shadow:0 4px 12px rgba(245,158,11,0.20)">

        ${s.background ? `

          </div>` : ''}

        <!-- Latest contact summary banner -->
        ${s.comments.length > 0 ? (() => {
          const last = s.comments[0];
          const emp = empById(last.employee);
          const chIcon = ({Called:'phone',WhatsApp:'message-circle',Email:'mail',SMS:'message-square','In-person':'user-check'})[last.channel||'Called'];

          <div class="ring-1 ring-emerald-400/20 bg-emerald-400/[0.04] rounded-lg p-3.5 flex items-center gap-3">

                <span class="text-ink-300"> — ${last.channel||'Called'} · ${since(last.date)}</span>

          </div>`;
        })() : ''}

        <!-- Conversation thread: who followed up + what student said -->
        <div>
          <div class="flex items-center justify-between mb-3">
            <div class="text-[11px] uppercase tracking-wider text-ink-500 font-medium">Follow-up History · ${s.comments.length} ${s.comments.length===1?'entry':'entries'}</div>
            <div class="flex items-center gap-1 text-[10.5px] text-ink-500">
              <i data-lucide="users" class="w-3 h-3"></i>
              <span>${[...new Set(s.comments.map(c=>c.employee))].length} team ${[...new Set(s.comments.map(c=>c.employee))].length===1?'member':'members'}</span>
            </div>
          </div>
          <ol class="space-y-3">
            ${s.comments.map((c,i)=>{
              const emp = empById(c.employee);
              const ch = c.channel || 'Called';
              const chIcon = ({Called:'phone',WhatsApp:'message-circle',Email:'mail',SMS:'message-square','In-person':'user-check'})[ch];
              const chColor = ({Called:'sky',WhatsApp:'emerald',Email:'violet',SMS:'amber','In-person':'rose'})[ch];
              return `
              <li class="relative pl-9">
                ${i!==s.comments.length-1?'<div class="absolute left-[14px] top-9 bottom-[-12px] w-px bg-white/10"></div>':''}

                <!-- Header: who did the follow-up + via which channel + when -->
                <div class="flex items-center gap-2 mb-2 flex-wrap text-[11.5px]">
                  <span class="font-semibold text-ink-100">${emp.name}</span>
                  <span class="text-ink-500">followed up via</span>
                  <span class="chip ${toneClass(chColor,'chip')}"><i data-lucide="${chIcon}" class="w-2.5 h-2.5"></i>${ch}</span>
                  <span class="text-ink-500">·</span>
                  <span class="text-ink-500 font-mono">${fmtDate(c.date)} <span class="text-ink-600">(${since(c.date)})</span></span>
                </div>

                <!-- Body: what the student said -->
                <div class="ring-1 ring-white/8 rounded-lg bg-ink-900/40 overflow-hidden">
                  <div class="flex items-center gap-1.5 px-3 py-1.5 border-b border-white/5 bg-white/[0.02]">
                    <i data-lucide="quote" class="w-3 h-3 text-ink-500"></i>
                    <span class="text-[10.5px] uppercase tracking-wider text-ink-500 font-medium">${s.name.split(' ')[0]} said</span>
                  </div>
                  <div class="px-3.5 py-2.5 text-[12.5px] text-ink-200 leading-relaxed italic">"${c.text}"</div>
                </div>

                <!-- Reactions strip (UI only) -->
                <div class="flex items-center gap-3 mt-2 ml-0.5 text-[10.5px] text-ink-500">
                  <button class="hover:text-emerald-300 flex items-center gap-1"><i data-lucide="message-square-reply" class="w-3 h-3"></i>Reply</button>
                  <button class="hover:text-amber-300 flex items-center gap-1"><i data-lucide="bookmark" class="w-3 h-3"></i>Pin</button>
                  <button class="hover:text-sky-300 flex items-center gap-1"><i data-lucide="at-sign" class="w-3 h-3"></i>@mention</button>
                  <span class="ml-auto text-ink-600">id: ${s.id}-c${i+1}</span>
                </div>
              </li>`;
            }).join('')}
          </ol>
        </div>
      </div>

      <!-- Footer composer · LOG CONTACT (manual entry after contacting student) -->
      <div class="border-t border-white/5 bg-ink-950/95">
        <div class="px-4 pt-3 pb-1 flex items-center justify-between">
          <div class="flex items-center gap-2">
            <i data-lucide="phone-call" class="w-3.5 h-3.5 text-emerald-400"></i>
            <span class="text-[11px] uppercase tracking-wider text-ink-300 font-semibold">Log Contact</span>
            <span class="text-[10.5px] text-ink-500">— record the conversation manually</span>
          </div>
          <span class="text-[10px] text-ink-500 font-mono">Last contact: ${since(s.lastContact)}</span>
        </div>

        <!-- Channel selector (mark which channel was used) -->
        <div class="px-4 pb-2 flex items-center gap-1.5 flex-wrap">
          <span class="text-[10.5px] text-ink-500 mr-1">Channel:</span>
          ${[
            {n:'Called', i:'phone', a:true},
            {n:'WhatsApp', i:'message-circle', a:false},
            {n:'Email', i:'mail', a:false},
            {n:'SMS', i:'message-square', a:false},
            {n:'In-person', i:'user-check', a:false},
          ].map(c=>`
            <button onclick="event.target.closest('.flex').querySelectorAll('button').forEach(b=>b.className='channel-btn px-2.5 h-7 rounded ring-1 ring-white/10 bg-white/[0.02] hover:bg-white/5 text-[11px] text-ink-300 flex items-center gap-1.5');this.className='channel-btn px-2.5 h-7 rounded ring-1 ring-emerald-400/40 bg-emerald-400/10 text-emerald-300 text-[11px] font-medium flex items-center gap-1.5'" class="channel-btn px-2.5 h-7 rounded ring-1 ${c.a?'ring-emerald-400/40 bg-emerald-400/10 text-emerald-300 font-medium':'ring-white/10 bg-white/[0.02] hover:bg-white/5 text-ink-300'} text-[11px] flex items-center gap-1.5">
              <i data-lucide="${c.i}" class="w-3 h-3"></i>${c.n}
            </button>
          `).join('')}
        </div>

        <!-- Manual comment textarea -->
        <div class="px-4 pb-2">
          <textarea placeholder="What did they say? Type your notes manually — be specific about commitments, concerns, next steps…" class="w-full px-3 py-2.5 bg-ink-900/60 ring-1 ring-white/10 rounded-md text-[12.5px] resize-none placeholder:text-ink-500 focus:outline-none focus:ring-1 focus:ring-emerald-400/50 focus:bg-ink-900" rows="3"></textarea>
        </div>

        <!-- Outcome chips + actions -->
        <div class="px-4 pb-3 flex items-center justify-between gap-2 flex-wrap">
          <div class="flex items-center gap-1.5 flex-wrap">
            <span class="text-[10.5px] text-ink-500 mr-0.5">Outcome:</span>
            ${['Interested','In Conversation','Follow-up needed','Not responding','Joined','Payment pending','Call back later'].map(r=>`
              <button class="chip bg-white/5 hover:bg-emerald-400/15 hover:text-emerald-300 text-ink-300 ring-1 ring-white/10 cursor-pointer">${r}</button>
            `).join('')}
          </div>
          <div class="flex items-center gap-1.5 ml-auto">
            <button class="w-7 h-7 grid place-items-center rounded ring-1 ring-white/10 bg-ink-900/60 hover:bg-ink-900 text-ink-400" title="Attach"><i data-lucide="paperclip" class="w-3.5 h-3.5"></i></button>
            <button class="w-7 h-7 grid place-items-center rounded ring-1 ring-white/10 bg-ink-900/60 hover:bg-ink-900 text-ink-400" title="Schedule follow-up"><i data-lucide="calendar-clock" class="w-3.5 h-3.5"></i></button>
            <button class="px-3 h-7 rounded bg-emerald-400 hover:bg-emerald-300 text-emerald-950 text-[11.5px] font-semibold flex items-center gap-1.5"><i data-lucide="check" class="w-3 h-3"></i>Save Comment</button>
          </div>
        </div>
      </div>
    </div>
  `;
  lucide.createIcons();
}

/* ============================================================

function renderFollowups() {

  const finalStretch= STUDENTS.filter(s=>s.progress===5);
  const completed   = STUDENTS.filter(s=>s.progress>=6);
  const blocked     = STUDENTS.filter(s=>s.emi && s.emi.status==='overdue');

  const fuCard = (s, urgent=false) => `
    <div onclick="openStudent('${s.id}')" class="p-3.5 ring-soft rounded-lg bg-ink-900/40 hover:bg-ink-900 cursor-pointer transition group">
      <div class="flex items-start justify-between gap-2 mb-2">
        <div class="flex items-center gap-2.5 min-w-0">
          <div class="w-9 h-9 rounded-full bg-gradient-to-br from-emerald-400/15 to-sky-400/15 ring-soft grid place-items-center text-[11px] font-semibold shrink-0">${s.initials}</div>
          <div class="min-w-0">
            <div class="text-[13px] font-medium truncate">${s.name}</div>
            <div class="text-[10.5px] text-ink-500 font-mono truncate">${s.id} · ${s.course}</div>
          </div>
        </div>
        ${urgent?'<i data-lucide="alert-triangle" class="w-4 h-4 text-rose-400 shrink-0"></i>':''}
      </div>
      <div class="flex items-center gap-1 flex-wrap mb-2.5">${s.tags.slice(0,2).map(t=>chip(t,tagTone(t))).join('')}</div>
      <div class="flex items-center justify-between text-[11px]">
        <div class="flex items-center gap-1.5 text-ink-400">
          <i data-lucide="clock" class="w-3 h-3"></i>
          <span class="font-mono">${since(s.lastContact)}</span>
        </div>
        ${progressDots(s.progress, 6, 'small', s.emi && s.emi.status==='overdue')}
      </div>
      <div class="flex items-center gap-1 mt-3 pt-3 border-t border-white/5 opacity-60 group-hover:opacity-100 transition">

        <button onclick="event.stopPropagation()" class="flex-1 px-2 py-1.5 rounded ring-soft text-[11px] hover:bg-white/5 flex items-center justify-center gap-1"><i data-lucide="message-circle" class="w-3 h-3"></i>WhatsApp</button>
        <button onclick="event.stopPropagation()" class="flex-1 px-2 py-1.5 rounded ring-soft text-[11px] hover:bg-white/5 flex items-center justify-center gap-1"><i data-lucide="check" class="w-3 h-3"></i>Done</button>
      </div>
    </div>`;

  const column = (title, tone, items, urgent=false) => `
    <div class="bg-ink-900/30 ring-soft rounded-xl p-3 flex-1 min-w-[280px]">
      <div class="flex items-center justify-between mb-3 px-1">
        <div class="flex items-center gap-2">
          <span class="w-1.5 h-1.5 rounded-full ${toneClass(tone,'dot')}"></span>
          <span class="text-[12.5px] font-semibold">${title}</span>
          <span class="text-[10.5px] text-ink-500 font-mono">${items.length}</span>

        <button class="text-ink-500 hover:text-ink-200"><i data-lucide="more-horizontal" class="w-3.5 h-3.5"></i></button>
      </div>
      <div class="space-y-2">${items.map(s=>fuCard(s,urgent)).join('') || '<div class="text-center py-8 text-[11.5px] text-ink-500">No items</div>'}</div>
    </div>`;

  return `
    <div class="px-6 py-6 max-w-[1600px] mx-auto space-y-4">
      <div class="flex items-end justify-between flex-wrap gap-4">
        <div>
          <h1 class="text-[22px] font-semibold tracking-tight">Follow-Ups</h1>
          <p class="text-ink-400 text-[13px] mt-0.5">Members grouped by course progress · ${STUDENTS.length} students in pipeline</p>
        </div>
        <div class="flex items-center gap-2">
          <div class="flex items-center gap-1 p-0.5 bg-ink-900/60 ring-soft rounded-md text-[11.5px] font-medium">
            <button class="px-2.5 py-1 rounded bg-ink-800 text-white flex items-center gap-1"><i data-lucide="layout-grid" class="w-3 h-3"></i>Pipeline</button>
            <button class="px-2.5 py-1 rounded text-ink-400 hover:text-white flex items-center gap-1"><i data-lucide="list" class="w-3 h-3"></i>List</button>
            <button class="px-2.5 py-1 rounded text-ink-400 hover:text-white flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i>Calendar</button>
          </div>
          <button class="px-3 h-8 rounded-md bg-emerald-400 hover:bg-emerald-300 text-emerald-950 text-[12.5px] font-semibold flex items-center gap-1.5"><i data-lucide="plus" class="w-3.5 h-3.5"></i>Schedule</button>

          {l:'Just Started',  d:'M1 – M2', v:justStarted.length, tone:'cyan',    icon:'play'},
          {l:'Building Up',   d:'M3 – M4', v:buildingUp.length,  tone:'sky',     icon:'trending-up'},
          {l:'Final Stretch', d:'M5',      v:finalStretch.length,tone:'violet',  icon:'flag'},
          {l:'Completed',     d:'M6 done', v:completed.length,   tone:'emerald', icon:'check-circle-2'},
          {l:'Access Blocked',d:'EMI overdue', v:blocked.length, tone:'rose',    icon:'lock'},
        ].map(c=>`
          <div class="p-4 bg-ink-900/40 ring-soft rounded-xl flex items-center gap-3">
            <div class="w-9 h-9 rounded-lg ${toneClass(c.tone,'chip')} grid place-items-center"><i data-lucide="${c.icon}" class="w-4 h-4"></i></div>
            <div>
              <div class="text-[10.5px] uppercase tracking-wider text-ink-500 font-medium">${c.l}</div>
              <div class="text-[20px] font-semibold tracking-tight num leading-none mt-0.5">${c.v}</div>
              <div class="text-[10px] text-ink-500 font-mono mt-0.5">${c.d}</div>
            </div>
          </div>
        `).join('')}
      </div>

/* ============================================================
   CHARTS
   ============================================================ */
function chartTheme() {
  const dark = document.documentElement.classList.contains('dark');
  return {
    grid: dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)',
    text: dark ? '#a1a1aa' : '#52525b',
    em:'#34d399', sky:'#7dd3fc', amber:'#fcd34d', rose:'#fb7185', violet:'#a78bfa', cyan:'#22d3ee',
  };
}
function hexToRgba(hex, a) {
  const m = hex.match(/^#?([\da-f]{2})([\da-f]{2})([\da-f]{2})$/i);
  if (!m) return hex;
  return `rgba(${parseInt(m[1],16)},${parseInt(m[2],16)},${parseInt(m[3],16)},${a})`;
}
function baseOpts() {
  const c = chartTheme();
  return {
    responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{display:false},
      tooltip:{
        backgroundColor:'#0a0a0a', titleColor:'#fff', bodyColor:'#e4e4e7',
        borderColor:c.grid, borderWidth:1, padding:8, cornerRadius:6,
        titleFont:{family:'Geist',size:11}, bodyFont:{family:'Geist Mono',size:11}
      }
    },
    scales:{
      x:{grid:{display:false},ticks:{color:c.text,font:{family:'Geist Mono',size:10}},border:{color:c.grid}},
      y:{grid:{color:c.grid},ticks:{color:c.text,font:{family:'Geist Mono',size:10}},border:{display:false}}
    }
  };
}

  });

  // ============= HEADER =============
  const header = `
    <div class="flex items-end justify-between flex-wrap gap-4">

  const search = `

  // ============= COHORT VIEW =============

        <div class="divide-y divide-white/5">
          ${weeksToShow.map((w, originalWi) => {
            const wi = m.weeks.indexOf(w);
            const st = trackerStatusFor(s, mi, wi);
            return `
              <div class="px-4 py-3 flex items-center gap-3 hover:bg-white/[0.02]">

  return `
    <div class="px-6 py-6 max-w-[1100px] mx-auto space-y-5">

// Compute the per-week status for a given student

// Manual overrides for week-level status — keyed by 'studentId-monthIdx-weekIdx'
let WEEK_STATUS_OVERRIDES = {};

// All status options that an employee can manually pick
const STATUS_OPTIONS = [
  { label:'Approved',     tone:'emerald', icon:'check-circle-2', desc:'Reviewed & accepted' },
  { label:'Submitted',    tone:'sky',     icon:'send',           desc:'Student turned it in' },
  { label:'In Progress',  tone:'amber',   icon:'clock',          desc:'Currently working on it' },
  { label:'Not Started',  tone:'zinc',    icon:'circle',         desc:'No work yet' },
  { label:'Not Completed',tone:'rose',    icon:'x-circle',       desc:'Attempted but not done' },
];

function getStatusObj(label) {
  return STATUS_OPTIONS.find(s => s.label === label) || STATUS_OPTIONS[3];
}

function setWeekStatus(studentId, monthIdx, weekIdx, label) {
  const key = studentId + '-' + monthIdx + '-' + weekIdx;
  if (label === '__reset__') {
    delete WEEK_STATUS_OVERRIDES[key];
    showToast(`M${monthIdx+1} W${weekIdx+1} reset to auto`, 'sky', 'rotate-ccw');
  } else {
    WEEK_STATUS_OVERRIDES[key] = label;
    const st = getStatusObj(label);
    showToast(`M${monthIdx+1} W${weekIdx+1} → ${label}`, st.tone, st.icon);
  }
  document.querySelectorAll('[data-status-menu]').forEach(el => el.remove());
  renderSection();
}

function openStatusMenu(studentId, monthIdx, weekIdx, ev) {
  ev.stopPropagation();
  ev.preventDefault();
  // Clear any existing menus
  document.querySelectorAll('[data-status-menu]').forEach(el => el.remove());
  const btn = ev.currentTarget;
  const rect = btn.getBoundingClientRect();
  const menu = document.createElement('div');
  menu.dataset.statusMenu = '1';
  menu.className = 'fixed z-[80] bg-ink-950 ring-1 ring-white/10 rounded-lg shadow-2xl p-1 w-[220px] animate-fadeIn';
  // Anchor below the chip
  let top = rect.bottom + 6;
  let left = rect.left;
  // If too close to right edge, anchor right-aligned
  if (left + 220 > window.innerWidth - 12) left = window.innerWidth - 232;
  // If too close to bottom, flip above
  if (top + 280 > window.innerHeight) top = rect.top - 280;
  menu.style.top = Math.max(8, top) + 'px';
  menu.style.left = Math.max(8, left) + 'px';
  const currentKey = studentId + '-' + monthIdx + '-' + weekIdx;
  const isOverridden = !!WEEK_STATUS_OVERRIDES[currentKey];
  menu.innerHTML = `
    <div class="px-2.5 pt-2 pb-1.5 text-[10px] uppercase tracking-wider text-ink-500 font-mono flex items-center justify-between">
      <span>M${monthIdx+1} · Week ${weekIdx+1}</span>
      ${isOverridden ? '<span class="text-amber-300">manually set</span>' : '<span class="text-emerald-300/70">auto</span>'}
    </div>
    ${STATUS_OPTIONS.map(s => `
      <button onclick="setWeekStatus('${studentId}', ${monthIdx}, ${weekIdx}, '${s.label}')" class="w-full text-left flex items-start gap-2.5 px-2.5 py-2 rounded-md hover:bg-white/5 transition group">
        <i data-lucide="${s.icon}" class="w-4 h-4 mt-0.5 ${s.tone === 'emerald' ? 'text-emerald-300' : s.tone === 'sky' ? 'text-sky-300' : s.tone === 'amber' ? 'text-amber-300' : s.tone === 'rose' ? 'text-rose-300' : 'text-ink-400'}"></i>
        <div class="flex-1 min-w-0">
          <div class="text-[12.5px] font-medium">${s.label}</div>
          <div class="text-[10.5px] text-ink-500">${s.desc}</div>
        </div>
      </button>
    `).join('')}
    ${isOverridden ? `
      <div class="h-px bg-white/5 my-1 mx-1"></div>
      <button onclick="setWeekStatus('${studentId}', ${monthIdx}, ${weekIdx}, '__reset__')" class="w-full text-left flex items-center gap-2 px-2.5 py-2 rounded-md hover:bg-white/5 text-[12px] text-ink-400">
        <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i>
        <span>Reset to auto-derived</span>
      </button>
    ` : ''}
  `;
  document.body.appendChild(menu);
  lucide.createIcons();
  // Close on outside click
  setTimeout(() => {
    const closer = (e) => {
      if (!menu.contains(e.target)) {
        menu.remove();
        document.removeEventListener('click', closer);
      }
    };
    document.addEventListener('click', closer);
  }, 10);
}

function trackerStatusFor(student, monthIdx, weekIdx) {
  // 1. Manual override always wins (unless EMI block applies — security check)
  const blocked = student.emi && student.emi.status==='overdue' && monthIdx >= student.progress;
  if (blocked) return {label:'Blocked', tone:'rose', icon:'lock'};
  const key = student.id + '-' + monthIdx + '-' + weekIdx;
  if (WEEK_STATUS_OVERRIDES[key]) return getStatusObj(WEEK_STATUS_OVERRIDES[key]);
  // 2. Otherwise auto-derive from progress
  if (monthIdx < student.progress) return {label:'Approved', tone:'emerald', icon:'check-circle-2'};
  if (monthIdx === student.progress) {
    if (weekIdx === 0) return {label:'Approved', tone:'emerald', icon:'check-circle-2'};
    if (weekIdx === 1) return {label:'Submitted', tone:'sky', icon:'send'};
    if (weekIdx === 2) return {label:'In Progress', tone:'amber', icon:'clock'};
    return {label:'Not Started', tone:'zinc', icon:'circle'};
  }
  return {label:'Not Started', tone:'zinc', icon:'circle'};
}

function trackerTaskState(student, monthIdx, weekIdx, taskIdx) {
  const blocked = student.emi && student.emi.status==='overdue' && monthIdx >= student.progress;
  if (blocked) return 'blocked';
  if (monthIdx < student.progress) return 'done';
  if (monthIdx === student.progress) {
    if (weekIdx === 0) return 'done';
    if (weekIdx === 1) return taskIdx < 2 ? 'done' : 'pending';
    if (weekIdx === 2) return taskIdx === 0 ? 'done' : 'pending';
    return 'pending';
  }
  return 'pending';
}

function toggleMonthStatus(studentId, monthIdx) {
  const s = STUDENTS.find(x => x.id === studentId);
  if (!s) return;
  // Block edits beyond the locked threshold for EMI defaulters
  if (s.emi && s.emi.status === 'overdue' && monthIdx >= s.progress) {
    showToast('Course access is locked — clear the EMI to update progress', 'rose', 'lock');
    return;
  }
  // Toggle the cell
  s.monthsStatus[monthIdx] = s.monthsStatus[monthIdx] === 'done' ? 'pending' : 'done';
  // Recompute progress as the largest contiguous run of 'done' from the start
  let p = 0;
  for (const m of s.monthsStatus) { if (m === 'done') p++; else break; }
  s.progress = p;
  showToast(`M${monthIdx+1} marked as ${s.monthsStatus[monthIdx]} for ${s.name.split(' ')[0]}`, 'emerald', 'check-circle-2');
  // Celebrate course completion — show a follow-up toast prompting an award
  if (s.progress === 6 && s.monthsStatus.every(m => m === 'done')) {
    setTimeout(() => {
      const root = document.getElementById('modalRoot');
      const wrap = document.createElement('div');
      wrap.className = 'fixed top-20 right-6 z-[80] animate-slideIn';
      wrap.style.animationDuration = '.3s';
      wrap.innerHTML = `
        <div class="rounded-xl px-4 py-3.5 shadow-2xl flex items-center gap-3 max-w-sm cursor-pointer" style="background:linear-gradient(135deg,#fcd34d,#f59e0b);box-shadow:0 12px 40px rgba(245,158,11,0.4)" onclick="openAddAward('${studentId}');this.parentElement.remove()">
          <div class="w-10 h-10 rounded-full bg-amber-950/20 ring-2 ring-amber-950/30 grid place-items-center shrink-0">
            <i data-lucide="party-popper" class="w-5 h-5 text-amber-950"></i>
          </div>
          <div class="flex-1 min-w-0 text-amber-950">
            <div class="text-[10.5px] uppercase tracking-wider font-bold opacity-80">Course Complete</div>
            <div class="text-[13px] font-bold">${s.name} finished all 6 months</div>
            <div class="text-[11px] font-medium opacity-90 mt-0.5">Tap to grant an award &rarr;</div>
          </div>
        </div>`;
      document.body.appendChild(wrap);
      lucide.createIcons();
      setTimeout(() => wrap.remove(), 6000);
    }, 600);
  }
  openStudent(studentId);   // re-open to reflect changes
}

function showToast(msg, tone='emerald', icon='check-circle-2') {
  const root = document.getElementById('modalRoot');
  const colors = {
    emerald: 'bg-emerald-400 text-emerald-950',
    rose:    'bg-rose-400 text-rose-950',
    sky:     'bg-sky-400 text-sky-950',
    amber:   'bg-amber-400 text-amber-950',
  }[tone] || 'bg-emerald-400 text-emerald-950';
  // Append toast (don't clobber an open modal)
  const wrap = document.createElement('div');
  wrap.className = 'fixed top-6 right-6 z-[80] animate-slideIn';
  wrap.style.animationDuration = '.25s';
  wrap.innerHTML = `<div class="${colors} rounded-lg px-4 py-3 shadow-2xl flex items-center gap-2.5 max-w-sm">
      <i data-lucide="${icon}" class="w-5 h-5"></i>
      <div class="text-[12.5px] font-semibold">${msg}</div>
    </div>`;
  document.body.appendChild(wrap);
  lucide.createIcons();
  setTimeout(() => wrap.remove(), 2400);
}

function updateEmpInitials() {
  const name = document.getElementById('emp-name').value.trim();
  const initEl = document.getElementById('emp-initials');
  if (!initEl || initEl.value.length === 2) return;   // don't overwrite if user typed
  const parts = name.split(/\s+/).filter(Boolean);
  if (parts.length >= 2) initEl.value = (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
  else if (parts.length === 1 && parts[0].length >= 2) initEl.value = parts[0].slice(0,2).toUpperCase();
}

function closeAddEmployee() {
  document.getElementById('modalRoot').innerHTML = '';
}

function submitAddEmployee() {
  const name = document.getElementById('emp-name').value.trim();
  const email = document.getElementById('emp-email').value.trim();
  const initials = document.getElementById('emp-initials').value.trim().toUpperCase();
  if (!name || !email || !initials) {
    showToast('Please fill name, email, and initials', 'rose', 'alert-triangle');
    return;
  }
  const role = document.querySelector('input[name="role"]:checked')?.value || 'Onboarding Lead';
  const gradient = document.querySelector('input[name="gradient"]:checked')?.value || 'from-emerald-400 to-teal-500';
  // Generate a 2-letter id from initials, ensure uniqueness
  let id = initials;
  let suffix = 1;
  while (EMPLOYEES.find(e=>e.id===id)) {
    id = initials.slice(0,1) + String(suffix++);
  }
  EMPLOYEES.push({
    id, name, role,
    students: 0, completion: 0,
    lastActive: 'just now',
    joined: new Date().toISOString().slice(0,10),
    avatar: gradient,
    email,
  });
  closeAddEmployee();
  showToast(`${name} invited as ${role}`, 'emerald', 'mail-check');
  renderSection();   // refresh employee list
}

function submitAddAward() {
  const studentId = document.getElementById('aw-student').value;
  const name = document.getElementById('aw-name').value.trim();
  const date = document.getElementById('aw-date').value;
  const icon = document.getElementById('aw-icon').value.trim() || 'award';
  if (!studentId || !name || !date) {
    showToast('Please complete recipient, name, and date', 'rose', 'alert-triangle');
    return;
  }
  const s = STUDENTS.find(x => x.id === studentId);
  if (!s) return;
  s.awards.unshift({ name, date, icon });
  // Add an Award Winner tag if not already there
  if (!s.tags.includes('Award Winner')) s.tags.push('Award Winner');
  closeAddAward();
  showToast(`🏆 ${name} granted to ${s.name.split(' ')[0]}`, 'amber', 'trophy');
  renderSection();   // refresh whatever page we're on
}

function submitAddAssignment(createdBy) {
  const title = document.getElementById('ca-title').value.trim();
  const studentId = document.getElementById('ca-student').value;
  const month = parseInt(document.getElementById('ca-month').value, 10);
  const weekVal = document.getElementById('ca-week').value;
  const week = weekVal ? parseInt(weekVal, 10) : null;
  const due = document.getElementById('ca-due').value;
  const notes = document.getElementById('ca-notes').value.trim();
  if (!title) { showToast('Please enter a title', 'rose', 'alert-triangle'); return; }
  // Generate id
  const next = (CUSTOM_ASSIGNMENTS.length + 1).toString().padStart(3, '0');
  CUSTOM_ASSIGNMENTS.unshift({
    id: 'CA-' + next,
    title, studentId, month, week, due, notes,
    createdBy: createdBy || 'FM',
    createdAt: new Date().toISOString().slice(0,10),
    status: 'open',
  });
  closeAddAssignment();
  const targetLabel = studentId === 'all' ? `cohort (${STUDENTS.length} students)` : (STUDENTS.find(s=>s.id===studentId)?.name.split(' ')[0] || 'student');
  showToast(`Assignment "${title.length>30?title.slice(0,30)+'…':title}" assigned to ${targetLabel}`, 'sky', 'clipboard-plus');
  renderSection();
}

function confirmDeleteCustomAssignment(id) {
  const idx = CUSTOM_ASSIGNMENTS.findIndex(a => a.id === id);
  if (idx > -1) {
    const removed = CUSTOM_ASSIGNMENTS.splice(idx, 1)[0];
    closeAddAssignment();
    showToast(`Assignment "${removed.title.length>30?removed.title.slice(0,30)+'…':removed.title}" deleted`, 'rose', 'trash-2');
    renderSection();
  }
}

    const el = document.getElementById('role'+role.charAt(0).toUpperCase()+role.slice(1));
    if (role===r) {
      el.className = 'role-btn flex-1 py-2.5 rounded-lg text-sm font-medium flex items-center justify-center gap-2 bg-ink-800 text-white';
    } else {
      el.className = 'role-btn flex-1 py-2.5 rounded-lg text-sm font-medium flex items-center justify-center gap-2 text-ink-400 hover:text-ink-200';
    }
  });
  lucide.createIcons();
}

function enterApp() {
  State.role = _selectedRole;
  State.current = State.role==='admin' ? 'dashboard' : 'emp-overview';
  if (State.role==='admin') {
    document.getElementById('userAvatar').textContent = 'FM';
    document.getElementById('userAvatar').className = 'w-8 h-8 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center text-[11px] font-semibold text-emerald-950';
    document.getElementById('userName').textContent = 'Falguni Mehra';
    document.getElementById('userRole').textContent = 'admin · falguni@dv.io';
  } else {
    document.getElementById('userAvatar').textContent = 'DV';
    document.getElementById('userAvatar').className = 'w-8 h-8 rounded-full bg-gradient-to-br from-sky-400 to-indigo-500 flex items-center justify-center text-[11px] font-semibold text-white';
    document.getElementById('userName').textContent = 'Divya Venkat';
    document.getElementById('userRole').textContent = 'employee · divya@dv.io';
  }
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appShell').classList.remove('hidden');
  document.getElementById('appShell').classList.add('flex');
  renderNav();
  renderSection();
}

function logout() {
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('appShell').classList.add('hidden');
  document.getElementById('appShell').classList.remove('flex');
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.classList.contains('dark');
  if (isDark) {
    html.classList.remove('dark');
    document.body.classList.remove('bg-ink-950','text-ink-100');
    document.body.classList.add('bg-zinc-50','text-zinc-900');
    document.getElementById('themeIcon').setAttribute('data-lucide','moon');
  } else {
    html.classList.add('dark');
    document.body.classList.add('bg-ink-950','text-ink-100');
    document.body.classList.remove('bg-zinc-50','text-zinc-900');
    document.getElementById('themeIcon').setAttribute('data-lucide','sun');
  }
  lucide.createIcons();
  // re-render to refresh chart colours
  if (!document.getElementById('appShell').classList.contains('hidden')) {
    renderSection();
  }
}
